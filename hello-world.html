<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello, world</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #fef6e4 0%, #f3d2c1 50%, #8bd3dd 100%);
      color: #172c66;
      padding: 2rem;
    }
    .card {
      max-width: 36rem;
      text-align: center;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      padding: 3rem 2.5rem;
      border-radius: 1.25rem;
      box-shadow: 0 20px 50px -20px rgba(0,0,0,0.25);
    }
    h1 {
      font-size: clamp(2.25rem, 6vw, 3.5rem);
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 0.5rem 0;
      color: #2d3a6b;
    }
    .wave { display: inline-block; animation: wave 2s ease-in-out infinite; transform-origin: 70% 70%; }
    @keyframes wave {
      0%, 60%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(14deg); }
      20% { transform: rotate(-8deg); }
      30% { transform: rotate(14deg); }
      40% { transform: rotate(-4deg); }
      50% { transform: rotate(10deg); }
    }
    footer { margin-top: 1.5rem; font-size: 0.9rem; opacity: 0.7; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello, world <span class="wave" aria-hidden="true">👋</span></h1>
    <p>This page is live on the open web — a small hello from a quiet corner of the internet.</p>
    <p>If you can read this, everything is working beautifully.</p>
    <footer>Published via <code>/rom-publish</code></footer>
  </main>
</body>
</html>
