<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Book on Behalf — UX Mockups</title>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wmgp02ftys");
</script>
<style>
  :root {
    --B40:#3899EC;--B30:#2B5672;
    --D10:#162D3D;--D20:#32536A;--D30:#7A92A5;--D40:#BAC9D1;
    --D50:#DFE5EB;--D55:#E9EDF0;--D70:#F7F8F8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:#fff;color:var(--D10);display:flex;flex-direction:column;}

  /* ── Top nav bar ── */
  .topnav{height:52px;background:#fff;border-bottom:1px solid var(--D55);display:flex;align-items:center;padding:0 24px;gap:8px;flex-shrink:0;}
  .topnav__brand{font-size:13px;font-weight:700;color:var(--D30);letter-spacing:1px;text-transform:uppercase;margin-right:16px;}
  .topnav__title{font-size:15px;font-weight:700;color:var(--D10);margin-right:24px;}

  .tab{height:52px;display:inline-flex;align-items:center;gap:8px;padding:0 16px;font-size:13px;font-weight:500;color:var(--D30);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
  .tab:hover{color:var(--D10);}
  .tab.is-active{color:var(--B40);border-bottom-color:var(--B40);font-weight:600;}

  .tab__icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .tab__icon--purple{background:#F0EEFF;}
  .tab__icon--blue{background:#EAF4FF;}
  .tab__icon--green{background:#E6F7EE;}

  /* ── iframe fills remaining height ── */
  .frame-wrap{flex:1;overflow:hidden;}
  iframe{width:100%;height:100%;border:none;display:block;}
</style>
</head>
<body>

<nav class="topnav">
  <span class="topnav__brand">Wix Bookings</span>
  <span class="topnav__title">Book on Behalf</span>

  <button class="tab is-active" data-src="booking-policy-tabs.html" onclick="switchTab(this)">
    <span class="tab__icon tab__icon--purple">⚙️</span>
    Booking Policy
  </button>
  <button class="tab" data-src="client-booking-on-behalf.html" onclick="switchTab(this)">
    <span class="tab__icon tab__icon--blue">📱</span>
    Client Booking Flow
  </button>
  <button class="tab" data-src="owner-calendar-book-on-behalf.html" onclick="switchTab(this)">
    <span class="tab__icon tab__icon--green">📅</span>
    Owner Calendar
  </button>
</nav>

<div class="frame-wrap">
  <iframe id="frame" src="booking-policy-tabs.html"></iframe>
</div>

<script>
  function switchTab(btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('is-active'));
    btn.classList.add('is-active');
    document.getElementById('frame').src = btn.dataset.src;
  }
</script>
</body>
</html>
